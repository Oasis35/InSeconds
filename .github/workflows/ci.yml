name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  back:
    name: Backend (build + EF migrations check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/back/global.json

      - name: Restore
        working-directory: src/back
        run: dotnet restore InSeconds.slnx

      - name: Build (Release)
        working-directory: src/back
        run: dotnet build InSeconds.slnx --configuration Release --no-restore

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Verify EF model has no pending migrations
        working-directory: src/back/InSeconds.Api
        run: dotnet ef migrations has-pending-model-changes --no-build --configuration Release

  unit-tests:
    name: Backend (unit tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/back/global.json

      - name: Restore
        working-directory: src/back
        run: dotnet restore InSeconds.slnx

      - name: Test
        working-directory: src/back
        run: dotnet test InSeconds.Api.UnitTests --no-restore --logger "console;verbosity=normal"

  front:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/front/InSeconds.Client/package-lock.json

      - name: Install (clean)
        working-directory: src/front/InSeconds.Client
        run: npm ci

      - name: Build (production)
        working-directory: src/front/InSeconds.Client
        run: npm run build

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [back, unit-tests, front]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: inseconds
          POSTGRES_PASSWORD: inseconds_e2e
          POSTGRES_DB: inseconds_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inseconds"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/back/global.json

      - name: Restore .NET
        working-directory: src/back
        run: dotnet restore InSeconds.slnx

      - name: Build .NET (Debug)
        working-directory: src/back
        run: dotnet build InSeconds.slnx --configuration Debug --no-restore

      - name: Start backend
        working-directory: src/back/InSeconds.Api
        run: dotnet run --no-build --urls http://localhost:5171 &
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ConnectionStrings__DefaultConnection: >-
            Host=localhost;Port=5432;Database=inseconds_e2e;Username=inseconds;Password=inseconds_e2e
          AdminPassword: e2e-admin-password
          E2E_FRONT_PORT: '5173'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/front/InSeconds.Client/package-lock.json

      - name: Install npm dependencies
        working-directory: src/front/InSeconds.Client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/front/InSeconds.Client
        run: npx playwright install --with-deps chromium

      - name: Start Angular dev server
        working-directory: src/front/InSeconds.Client
        run: npx ng serve --configuration e2e --port 5173 &

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5171/health && break
            echo "Waiting for backend ($i/30)..."
            sleep 2
          done

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && break
            echo "Waiting for frontend ($i/30)..."
            sleep 2
          done

      - name: Run E2E tests
        working-directory: src/front/InSeconds.Client
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/front/InSeconds.Client/playwright-report/
          retention-days: 7
