<div class="bg-gray-800 rounded-xl p-8 flex flex-col items-center gap-6 w-full max-w-md">
  <h2 class="text-lg font-semibold">{{ 'admin.login' | translate }}</h2>
  <input type="password" [(ngModel)]="password" [placeholder]="'admin.passwordPlaceholder' | translate"
    [attr.aria-label]="'admin.passwordPlaceholder' | translate"
    (keydown.enter)="login()"
    class="w-full bg-gray-700 text-white rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-purple-500" />
  <button (click)="login()" [disabled]="loginStatus() === 'loading'"
    class="w-full bg-purple-600 hover:bg-purple-700 disabled:opacity-50 text-white font-semibold py-3 rounded-lg transition-colors">
    @if (loginStatus() === 'loading') { {{ 'admin.loggingIn' | translate }} } @else { {{ 'admin.loginButton' | translate }} }
  </button>
  @if (loginStatus() === 'error') {
    <p class="text-red-400 text-sm">{{ 'admin.wrongPassword' | translate }}</p>
  }
</div>
<a routerLink="/" class="text-sm text-gray-500 hover:text-gray-300 transition-colors text-center w-full block mt-4">{{ 'admin.backToGame' | translate }}</a>
