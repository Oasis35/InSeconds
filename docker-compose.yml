services:
  database:
    image: postgres:17-alpine
    container_name: inseconds.database
    environment:
      POSTGRES_DB: inseconds
      POSTGRES_USER: inseconds
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inseconds -d inseconds"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./src/back
      dockerfile: InSeconds.Api/Dockerfile
    container_name: inseconds.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=database;Port=5432;Database=inseconds;Username=inseconds;Password=${DB_PASSWORD}"
      AdminPassword: ${ADMIN_PASSWORD}
    ports:
      - "5171:8080"
    volumes:
      - ./src/back:/src
      - /src/InSeconds.Api/bin
      - /src/InSeconds.Api/obj
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
