version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: in3secs-sql
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: REDACTED
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "REDACTED" -Q "SELECT 1"
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  sqlserver_data:
